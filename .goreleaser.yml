# GoReleaser config for publishing to the Terraform/OpenTofu registry.
# See https://goreleaser.com and the registry's publishing requirements.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      # The registry requires statically-linked, CGO-free binaries.
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{ .Version }}'
    goos:
      - freebsd
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - '386'
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: '386'
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    # Passphrase via stdin.
    stdin: '{{ .Env.GPG_PASSWORD }}'
    args:
      # Non-interactive signing; fingerprint selects the signing key.
      - '--batch'
      - '--pinentry-mode'
      - 'loopback'
      - '--passphrase-fd'
      - '0'
      - '--local-user'
      - '{{ .Env.GPG_FINGERPRINT }}'
      - '--output'
      - '${signature}'
      - '--detach-sign'
      - '${artifact}'

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  # The release body comes from CHANGELOG.md, passed via --release-notes in the
  # workflow. The changelog pipe must stay enabled: disable: true would make
  # GoReleaser ignore --release-notes and publish an empty body.
  disable: false
