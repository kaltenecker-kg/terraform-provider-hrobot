name: Tests

on:
  pull_request:
    paths-ignore:
      - 'README.md'
  push:
    paths-ignore:
      - 'README.md'

permissions:
  contents: read

# hrobot-go is consumed via a local `replace => ../hrobot-go` directive, so it is
# checked out as a sibling in every job. This requires hrobot-go to be readable
# with the default token (i.e. public). Once the provider pins a published
# hrobot-go release and drops the replace, remove the second checkout and let
# `go mod download` fetch it normally.
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: terraform-provider-hrobot
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: terraform-provider-hrobot
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: kaltenecker-kg/hrobot-go
          path: hrobot-go
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: terraform-provider-hrobot/go.mod
          cache: true
          cache-dependency-path: terraform-provider-hrobot/go.sum
      - run: go mod download
      - run: go build -v ./...
      - name: go vet
        run: go vet ./...
      - name: Run linters
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          working-directory: terraform-provider-hrobot

  test:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform-provider-hrobot
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: terraform-provider-hrobot
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: kaltenecker-kg/hrobot-go
          path: hrobot-go
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: terraform-provider-hrobot/go.mod
          cache: true
          cache-dependency-path: terraform-provider-hrobot/go.sum
      - run: go mod download
      - run: go test -v -race -cover -timeout=180s ./...

  quality:
    name: Module Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: terraform-provider-hrobot
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          path: terraform-provider-hrobot
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          repository: kaltenecker-kg/hrobot-go
          path: hrobot-go
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: terraform-provider-hrobot/go.mod
          cache: true
          cache-dependency-path: terraform-provider-hrobot/go.sum
      - name: go mod tidy is clean
        run: go mod tidy -diff
      - name: go mod verify
        run: go mod verify
      - name: govulncheck
        # Pinned by commit SHA for reproducibility (Renovate bumps it); the
        # vulnerability database is still fetched fresh at run time.
        run: go run golang.org/x/vuln/cmd/govulncheck@19b0bb6a272792b9afa8a6983c3e9b9a1816947f ./... # v1.6.0
