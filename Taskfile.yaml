# Task runner for terraform-provider-hrobot (https://taskfile.dev). Mirrors the
# CI checks (build/lint/vet/test/quality) and adds a `release` task that tags the
# newest CHANGELOG version and pushes to trigger the release workflow
# (.github/workflows/release.yml).
version: "3"

vars:
  BINARY: terraform-provider-hrobot
  VERSION: '{{.VERSION | default "0.0.0-dev"}}'
  # Local plugin directory layout for `terraform`/`tofu` dev overrides.
  HOSTNAME: registry.terraform.io
  NAMESPACE: kaltenecker-kg
  NAME: hrobot
  OS_ARCH:
    sh: echo "$(go env GOOS)_$(go env GOARCH)"
  INSTALL_DIR: '{{.HOME}}/.terraform.d/plugins/{{.HOSTNAME}}/{{.NAMESPACE}}/{{.NAME}}/{{.VERSION}}/{{.OS_ARCH}}'

tasks:
  default:
    desc: List available tasks.
    # Bare `task` should be safe/inert — show the menu instead of running work.
    silent: true
    cmds:
      - task --list

  tidy:
    desc: Run go mod tidy.
    cmds:
      - go mod tidy

  fmt:
    desc: Format Go code via golangci-lint.
    cmds:
      - golangci-lint run --fix

  lint:
    desc: Run golangci-lint.
    cmds:
      - golangci-lint run

  vet:
    desc: Run go vet.
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests with the race detector.
    cmds:
      - go test -v -race -cover -timeout=180s ./...

  tidy-check:
    desc: Fail if go.mod/go.sum are not tidy.
    cmds:
      - go mod tidy -diff

  verify:
    desc: Verify module dependencies against go.sum.
    cmds:
      - go mod verify

  vulncheck:
    desc: Scan for known vulnerabilities in dependencies and reachable code.
    # govulncheck is pinned by commit SHA for reproducibility; Renovate bumps it.
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@19b0bb6a272792b9afa8a6983c3e9b9a1816947f ./... # v1.6.0

  docs:
    desc: Generate registry documentation under docs/ from the provider schema.
    # tfplugindocs extracts the schema via the Terraform CLI (a dev-time tool
    # only; downloaded automatically when absent). The pinned version lives in
    # the //go:generate directive in main.go.
    cmds:
      - go generate ./...

  release-snapshot:
    desc: Build an unpublished snapshot release locally to validate goreleaser.
    # Signing is skipped so the snapshot builds without the GPG signing key that
    # only the release workflow holds.
    cmds:
      - goreleaser release --snapshot --clean --skip=sign

  check:
    desc: Run all quality gates (lint, vet, test, tidy-check, verify, vulncheck).
    cmds:
      - task: lint
      - task: vet
      - task: test
      - task: tidy-check
      - task: verify
      - task: vulncheck

  build:
    desc: Build the provider binary.
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BINARY}} .

  install:
    desc: Build and install into the local Terraform plugin cache.
    deps: [build]
    cmds:
      - mkdir -p "{{.INSTALL_DIR}}"
      - mv {{.BINARY}} "{{.INSTALL_DIR}}/{{.BINARY}}_v{{.VERSION}}"

  clean:
    desc: Remove build artifacts.
    cmds:
      - rm -f {{.BINARY}}

  version:
    desc: Print the release version derived from CHANGELOG.md.
    silent: true
    # Single source of truth: the newest released heading in CHANGELOG.md
    # (goreleaser derives the build version from the git tag).
    vars:
      RELEASE_VERSION:
        sh: grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | cut -d' ' -f2
    cmds:
      - echo "v{{.RELEASE_VERSION}}"

  release:
    desc: Verify, tag the newest CHANGELOG version, and push to trigger the release workflow.
    vars:
      RELEASE_VERSION:
        sh: grep -m1 -oE '^## [0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | cut -d' ' -f2
    deps: [lint, vet, test]
    preconditions:
      - sh: '[ -n "{{.RELEASE_VERSION}}" ]'
        msg: "could not derive a version from CHANGELOG.md"
      - sh: '[ -z "$(awk ''/^## Unreleased/{f=1;next} /^## /{f=0} f && NF'' CHANGELOG.md)" ]'
        msg: "the Unreleased section is not empty; stamp it as a version first"
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "working tree is not clean; commit or stash first"
      - sh: '[ "$(git rev-parse --abbrev-ref HEAD)" = "main" ]'
        msg: "releases must be cut from main"
      - sh: 'git fetch -q origin main && [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]'
        msg: "local main is not in sync with origin/main; pull first"
      - sh: '! git rev-parse "v{{.RELEASE_VERSION}}" >/dev/null 2>&1'
        msg: "tag v{{.RELEASE_VERSION}} already exists"
    cmds:
      - git tag -a "v{{.RELEASE_VERSION}}" -m "v{{.RELEASE_VERSION}}"
      - git push origin "v{{.RELEASE_VERSION}}"
      - echo "pushed v{{.RELEASE_VERSION}}; the release workflow will publish the signed registry release"
